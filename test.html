<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDnet人格测试 - 测试页面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- 自定义配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0052D9', // 匹配图片的蓝色
          },
          fontFamily: {
            sans: ['PingFang SC', 'Microsoft YaHei', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .text-shadow-sm {
        text-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }
      .btn-shadow {
        box-shadow: 0 8px 20px rgba(0, 82, 217, 0.25);
      }
      .btn-hover {
        transition: all 0.3s ease;
      }
      .btn-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(0, 82, 217, 0.3);
      }
      .option-hover {
        transition: all 0.3s ease;
      }
      .option-hover:hover {
        transform: translateX(8px);
      }
    }
  </style>
  
  <style>
    /* 全局基础样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      -webkit-tap-highlight-color: transparent;
    }
    
  /* ════════════════════════════════════════
     移动端响应式（≤768px）
  ════════════════════════════════════════ */
  @media (max-width: 768px) {

    /* ── 主容器 ── */
    .w-full.max-w-4xl {
      max-width: 100%;
    }

    /* ── 头部 ── */
    header.bg-primary.bg-opacity-90.text-white.py-6.px-8 {
      padding: 0.6rem 1rem;
    }
    h1.text-3xl {
      font-size: 1.05rem;
      gap: 0.4rem;
    }
    header img.h-12 {
      height: 1.8rem;
    }

    /* ── main：高度到页面3/4处，flex 布局让按钮贴底 ── */
    main.p-8 {
      padding: 1rem 1rem 1.25rem !important;
      min-height: calc((100dvh - 56px) * 0.75);
      display: flex !important;
      flex-direction: column;
    }

    /* ── 进度条 ── */
    .mb-8 {
      margin-bottom: 1rem;
    }
    .flex.justify-between.text-sm.text-gray-600 {
      font-size: 0.72rem;
    }

    /* ── 问题容器 ── */
    #questionContainer {
      margin-bottom: 1rem;
    }

    /* 题目行：固定高度区域，重做按钮用 visibility 控制，不影响布局 */
    #questionContainer .flex.justify-between.items-center.mb-6 {
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      margin-bottom: 0.85rem;
      min-height: 88px; /* 题目文本行 + 重做按钮行，固定不变 */
    }

    /* 题目文本：独占整行 */
    #questionText {
      width: 100%;
      font-weight: 700;
      font-size: clamp(0.9rem, 2vw, 1.125rem);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: keep-all;
      line-height: 1.6;
      min-height: 1.6em; /* 至少一行高，防止空题时塌陷 */
    }

    /* 重做按钮：靠右对齐，固定尺寸，始终占位（visibility控制） */
    #redoBtn {
      align-self: flex-end;
      font-size: 0.68rem;
      padding: 0.3rem 0.75rem;
      min-height: 30px;
      height: 30px;
      border-radius: 6px;
      margin-top: 0.4rem;
      flex-shrink: 0;
    }

    /* ── 选项：固定高度，与底部按钮视觉相近 ── */
    .option {
      height: 52px;
      padding: 0 1rem;
      min-height: 52px;
      border-radius: 10px;
      display: flex;
      align-items: center;
    }

    .option p {
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: keep-all;
      line-height: 1.4;
    }

    /* 选项间距 */
    .space-y-3 > * + * {
      margin-top: 0.55rem !important;
    }

    /* ── 底部按钮：贴合白色模块底部偏上 ── */
    #btnRow {
      display: flex !important;
      flex-direction: row !important;
      justify-content: space-between !important;
      align-items: stretch !important;
      gap: 0.5rem;
      margin-top: auto;
      padding-top: 1rem;
    }

    #btnLeft {
      display: contents !important;
    }

    #historyBtn,
    #prevBtn,
    #nextBtn {
      flex: 1 1 0;
      min-width: 0;
      height: 52px;
      padding: 0 !important;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 12px !important;
      display: flex !important;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      letter-spacing: 0.02em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: opacity 0.2s, transform 0.1s;
    }

    #historyBtn:active,
    #prevBtn:active,
    #nextBtn:active {
      transform: scale(0.96);
    }

    #historyBtn {
      background: #e8f0fe !important;
      color: #3b5bdb !important;
      border: 1.5px solid #b8c8fa;
    }

    #prevBtn {
      background: #f1f3f5 !important;
      color: #495057 !important;
      border: 1.5px solid #dee2e6;
    }

    #nextBtn {
      background: #0052D9 !important;
      color: #fff !important;
      border: none;
      box-shadow: 0 4px 12px rgba(0,82,217,0.28);
    }

    #prevBtn:disabled,
    #nextBtn:disabled {
      opacity: 0.38 !important;
      box-shadow: none;
    }

    #historyBtn i,
    #prevBtn i,
    #nextBtn i {
      font-size: 0.95rem;
      margin: 0 !important;
    }

    /* ── 历史记录模态框 ── */
    #historyModal .max-w-4xl {
      max-width: 95vw;
      max-height: 88vh;
      padding: 0.75rem !important;
    }
    #historyModal .flex.justify-between.items-center.mb-4 {
      margin-bottom: 0.5rem !important;
      padding-bottom: 0.4rem !important;
    }
    #historyModal h2 { font-size: 1rem !important; }

    #historyContainer {
      max-height: calc(88vh - 100px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #historyContainer .bg-gray-50 {
      padding: 0.35rem 0.5rem !important;
      margin-bottom: 0.3rem !important;
      border-radius: 6px !important;
    }
    #historyContainer .flex.justify-between.items-start {
      margin-bottom: 0.15rem !important;
    }
    #historyContainer h3 {
      font-size: 0.7rem !important;
      font-weight: 700;
      margin-bottom: 0 !important;
      line-height: 1.2;
    }
    #historyContainer span.text-sm { font-size: 0.6rem !important; }

    #historyContainer p.text-gray-700 {
      font-size: 0.65rem !important;
      line-height: 1.3;
      margin-bottom: 0.2rem !important;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #historyContainer .bg-primary {
      padding: 0.2rem 0.4rem !important;
      border-radius: 4px !important;
    }
    #historyContainer .bg-primary p {
      font-size: 0.62rem !important;
      line-height: 1.3;
    }

    #historyModal .mt-4.pt-4 {
      margin-top: 0.4rem !important;
      padding-top: 0.4rem !important;
    }
    #closeHistoryBtn2 {
      padding: 0.4rem !important;
      font-size: 0.78rem !important;
    }

    /* 空状态 */
    #historyContainer .text-center.py-12 { padding: 1rem 0; }
    #historyContainer .text-4xl { font-size: 2rem; }
  }

  /* ── 更小屏幕（≤480px）微调 ── */
  @media (max-width: 480px) {
    main.p-8 { padding: 0.8rem 0.8rem 1rem !important; }
    h1.text-3xl { font-size: 0.95rem; }
    header img.h-12 { height: 1.6rem; }

    #questionText { 
      font-size: clamp(0.8rem, 4vw, 0.88rem);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 题目行在小屏同样固定高度 */
    #questionContainer .flex.justify-between.items-center.mb-6 {
      min-height: 80px;
    }

    .option {
      height: 48px;
      min-height: 48px;
    }
    .option p { font-size: 0.84rem; }

    #historyBtn, #prevBtn, #nextBtn {
      height: 48px;
      font-size: 0.72rem;
    }

    #btnRow { gap: 0.4rem; }
  }
    
    /* 触摸反馈 */
    button:active,
    .option:active {
      transform: scale(0.98);
      transition: transform 0.1s ease;
    }
    
    /* 选项触摸优化 */
    .option {
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    
    /* 按钮触摸优化 */
    button {
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
      min-width: 44px;
    }
    
    /* 链接触摸优化 */
    a {
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 触摸反馈优化 */
    .cursor-pointer:active {
      transform: scale(0.98);
      transition: transform 0.1s ease;
    }
    
    /* 加载优化 */
    .bg-cover {
      background-size: cover;
      background-position: center;
    }
  </style>
</head>

<body class="min-h-screen bg-[url('images/back.png')] bg-cover bg-center font-sans">
  <!-- 主容器 -->
  <div class="w-full max-w-4xl mx-auto min-h-screen">

        </div>
        <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">

      <!-- 问题区域 -->

        </div>
        <button id="nextBtn" class="px-6 py-3 bg-primary text-white rounded-lg font-medium btn-shadow btn-hover disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          下一题 <i class="fa fa-arrow-right ml-2"></i>
        </button>
      </div>
    </main>
  </div>


  
  <!-- 历史记录模态框 -->

        </button>
      </div>

      clearAllHistory();

      loadQuestion();
      updateProgress();
      bindEvents();

    // 彻底清除所有历史记录
    function clearAllHistory() {
      // 清除localStorage中的旧记录
      localStorage.removeItem('ddnet_answers');
      // 清除sessionStorage中的记录
      sessionStorage.removeItem('ddnet_answers');
      // 重置内存中的答题数据
      answers = {};
    }
    
    // 保存历史记录到会话存储（关闭浏览器后自动清除）
    function saveHistory() {
      sessionStorage.setItem('ddnet_answers', JSON.stringify(answers));
    }
    
    // 时间限制检测
    function checkTimeLimit() {
      if (!testStartTime) return false;
      const elapsedTime = (Date.now() - testStartTime) / 1000; // 转换为秒
      return elapsedTime < 20; // 小于20秒
    }
    
    // 答案模式检测 - 检查是否所有答案都是同一个选项
    function checkAnswerPattern() {
      const answerIndices = Object.values(answers);
      if (answerIndices.length === 0) return false;
      
      // 检查是否所有答案都相同
      const firstAnswer = answerIndices[0];
      return answerIndices.every(index => index === firstAnswer);
    }
    
    // 防刷分检测主函数
    function validateTestSubmission() {
      // 检查时间限制
      if (checkTimeLimit()) {
        alert('做题这么快，刷分吗，请重做！');
        resetTest();
        // 重新记录开始时间
        testStartTime = Date.now();
        return false;

      // 检查答案模式
      if (checkAnswerPattern()) {
        alert('乱选者，重做！');
        resetTest();
        // 重新记录开始时间
        testStartTime = Date.now();
        return false;
      }
      
      // 通过所有检测
      return true;
    }

    // 加载问题
    function loadQuestion() {
      const question = questions[currentQuestionIndex];
      currentQuestionEl.textContent = currentQuestionIndex + 1;
      questionTextEl.textContent = question.text;
      
      // 清空选项
      optionsContainerEl.innerHTML = '';
      
      // 添加选项
      question.options.forEach((option, index) => {
        const optionEl = document.createElement('div');
        optionEl.className = `option p-4 border border-gray-300 rounded-lg cursor-pointer option-hover ${answers[question.id] === index ? 'border-primary bg-primary bg-opacity-10' : 'bg-white bg-opacity-70'}`;
        optionEl.dataset.index = index;
        optionEl.dataset.value = option.value;
        optionEl.innerHTML = `
          <p class="font-medium text-gray-800">${option.text}</p>
        `;
        optionsContainerEl.appendChild(optionEl);
      });
      
      // 更新按钮状态
      updateButtonStates();
    }

        nextBtnEl.innerHTML = '查看结果 <i class="fa fa-check ml-2"></i>';
      } else {
        nextBtnEl.innerHTML = '下一题 <i class="fa fa-arrow-right ml-2"></i>';
      }
      
      // 控制重做按钮的显示：第1题隐藏（保持占位），第2-30题显示
      if (currentQuestionIndex === 0) {
        redoBtnEl.style.visibility = 'hidden';
      } else {
        redoBtnEl.style.visibility = 'visible';
      }
    }

    // 绑定事件
    function bindEvents() {
      // 选项点击事件
      let isTransitioning = false;
      optionsContainerEl.addEventListener('click', function(e) {
        if (isTransitioning) return;
        const optionEl = e.target.closest('.option');
        if (optionEl) {
          const index = parseInt(optionEl.dataset.index);
          const questionId = questions[currentQuestionIndex].id;
          answers[questionId] = index;
          
          // 保存历史记录
          saveHistory();
          
          // 自动跳转到下一题
          if (currentQuestionIndex < questions.length - 1) {
            isTransitioning = true;
            currentQuestionIndex++;
            loadQuestion();
            updateProgress();
            setTimeout(() => { isTransitioning = false; }, 300);
          } else {
            // 所有题目回答完毕，只更新选项显示（标记为已选）
            loadQuestion();
          }
        }
      });
      
      // 上一题按钮
      prevBtnEl.addEventListener('click', function() {
        if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          loadQuestion();
          updateProgress();
        }
      });
      
      // 下一题按钮
      nextBtnEl.addEventListener('click', function() {
        if (currentQuestionIndex < questions.length - 1) {
          currentQuestionIndex++;
          loadQuestion();
          updateProgress();
        } else {
          // 最后一题，先进行防刷分检测
          if (validateTestSubmission()) {
            // 通过检测，计算并显示结果
            calculateResult();
            showResult();
          }
        }
      });
      

      
      // 重做按钮 - 简单直接的事件绑定
      redoBtnEl.addEventListener('click', function() {
        resetTest();
      });
      
      // 历史记录按钮
      historyBtnEl.addEventListener('click', function() {
        showHistory();
      });
      
      // 关闭历史记录模态框
      closeHistoryBtnEl.addEventListener('click', function() {
        historyModalEl.classList.add('hidden');
      });
      
      closeHistoryBtn2El.addEventListener('click', function() {
        historyModalEl.classList.add('hidden');
      });
      
      // 点击模态框外部关闭
      historyModalEl.addEventListener('click', function(e) {
        if (e.target === historyModalEl) {
          historyModalEl.classList.add('hidden');
        }
      });
    }
    
    // 显示历史记录
    function showHistory() {
      // 清空历史记录容器
      historyContainerEl.innerHTML = '';
      
      // 按题目ID排序的已答题列表
      const answeredQuestions = Object.keys(answers)
        .map(id => parseInt(id))
        .sort((a, b) => a - b);
      
      if (answeredQuestions.length === 0) {
        // 没有历史记录
        historyContainerEl.innerHTML = `
          <div class="text-center py-12 text-gray-500">
            <i class="fa fa-history text-4xl mb-4"></i>
            <p>暂无答题记录</p>
          </div>
        `;
      } else {
        // 生成历史记录项
        answeredQuestions.forEach(questionId => {
          const question = questions.find(q => q.id === questionId);
          if (question) {
            const selectedIndex = answers[questionId];
            const selectedOption = question.options[selectedIndex];
            
            const historyItem = document.createElement('div');
            historyItem.className = 'bg-gray-50 p-4 rounded-lg border border-gray-200 hover:bg-gray-100 transition-colors';
            historyItem.innerHTML = `
              <div class="flex justify-between items-start mb-2">
                <h3 class="font-semibold text-lg">第 ${questionId} 题</h3>
                <span class="text-sm text-gray-500">已回答</span>
              </div>
              <p class="text-gray-700 mb-3">${question.text}</p>
              <div class="bg-primary bg-opacity-10 p-3 rounded-lg">
                <p class="font-medium text-primary">你的选择：${selectedOption.text}</p>
              </div>
            `;
            
            historyContainerEl.appendChild(historyItem);
          }
        });
      }
      
      // 显示历史记录模态框
      historyModalEl.classList.remove('hidden');
    }

    // 人格判定原型：七维 + 总分（总分越高越积极）
    const personalityPrototypes = {
      'Carry Goat': { social: 4, decision: 2, emotion: 1, humor: 0, responsibility: 5, challenge: 6, confidence: 6, total: 24 },
      'Team Supporter': { social: 6, decision: 1, emotion: 5, humor: 0, responsibility: 6, challenge: 1, confidence: 1, total: 20 },
      'Bald Grinder': { social: -2, decision: 3, emotion: 1, humor: -1, responsibility: 0, challenge: 7, confidence: 6, total: 14 },
      'Jokester': { social: 5, decision: 0, emotion: 3, humor: 8, responsibility: 0, challenge: 1, confidence: 1, total: 18 },
      'Rational Thinker': { social: 1, decision: 7, emotion: 0, humor: -1, responsibility: 3, challenge: 2, confidence: 2, total: 14 },
      'Emotional Player': { social: -3, decision: -3, emotion: -8, humor: -1, responsibility: -3, challenge: -2, confidence: -4, total: -24 },
      'Responsible Anchor': { social: 3, decision: 4, emotion: 2, humor: -1, responsibility: 8, challenge: 2, confidence: 2, total: 20 },
      'Friend Collector': { social: 8, decision: 1, emotion: 4, humor: 3, responsibility: 1, challenge: 0, confidence: 1, total: 18 },
      'Confident Competitor': { social: 1, decision: 1, emotion: 1, humor: 0, responsibility: 1, challenge: 7, confidence: 8, total: 19 },
      'Challenge Avoider': { social: -1, decision: -1, emotion: -1, humor: 1, responsibility: -2, challenge: -8, confidence: -5, total: -17 },
      'Self-Deprecating Humorist': { social: 3, decision: 0, emotion: 1, humor: 8, responsibility: -3, challenge: -1, confidence: -2, total: 6 },
      'Rusher': { social: -3, decision: -3, emotion: -1, humor: 0, responsibility: -8, challenge: 4, confidence: 4, total: -7 },
      'Lying Flat Fish': { social: 3, decision: 1, emotion: 0, humor: 0, responsibility: 1, challenge: -6, confidence: -6, total: -7 },
      'Balanced Player': { social: 0, decision: 0, emotion: 0, humor: 0, responsibility: 0, challenge: 0, confidence: 0, total: 0 }
    };

    // 计算结果
    function calculateResult() {
      // 初始化七个角度的分数
      const scores = {
        social: 0,
        decision: 0,
        emotion: 0,
        humor: 0,
        responsibility: 0,
        challenge: 0,
        confidence: 0
      };

      // 计算每个角度的总分
      Object.entries(answers).forEach(([questionId, index]) => {
        const question = questions.find(q => q.id == questionId);
        if (question) {
          const option = question.options[index];
          if (option && option.scores) {
            // 累加每个角度的分数
            Object.entries(option.scores).forEach(([angle, score]) => {
              scores[angle] += score;
            });
          }
        }
      });

      const totalScore = Object.values(scores).reduce((sum, n) => sum + n, 0);

      // 额外硬约束：带飞者必须“挑战”最高；独攀者必须“挑战”第二高
  function getAxisRanksByScore(s) {
    const axisOrder = ['challenge', 'confidence', 'responsibility', 'decision', 'social', 'emotion', 'humor'];
    const AXES = Object.keys(s);
    return AXES
      .slice()
      .sort((a, b) => (s[b] - s[a]) || (axisOrder.indexOf(a) - axisOrder.indexOf(b)));
  }
  const axisRanks = getAxisRanksByScore(scores);
      const isChallengeTop1 = axisRanks[0] === 'challenge';
      const isChallengeTop2 = axisRanks[1] === 'challenge';

      // 极端兜底：保证明显极端样本不会被中间人格误判
      if (totalScore <= -12 && scores.emotion <= -5) {
        result = { type: 'Emotional Player', ...ddnetTypes['Emotional Player'], scores, totalScore };
        return;
      }
      if (scores.challenge <= -5 && scores.confidence <= -4) {
        result = { type: 'Challenge Avoider', ...ddnetTypes['Challenge Avoider'], scores, totalScore };
        return;
      }
      if (scores.responsibility <= -6 && scores.decision <= -3 && scores.challenge >= 2) {
        result = { type: 'Rusher', ...ddnetTypes['Rusher'], scores, totalScore };
        return;
      }

      // 新增人格硬门槛：挑战偏低 + 社交中等 + 自信较低
      // 额外约束用于提高区分度：情绪不极端负，避免与“键盘粉碎者”混淆
      if (
        scores.challenge <= -3 &&
        scores.confidence <= -3 &&
        scores.social >= 1 && scores.social <= 5 &&
        scores.emotion >= -2
      ) {
        result = { type: 'Lying Flat Fish', ...ddnetTypes['Lying Flat Fish'], scores, totalScore };
        return;
      }

      // 常规判定：与人格原型做加权距离，最小即匹配（唯一）
      const axisWeights = {
        social: 1.0,
        decision: 1.1,
        emotion: 1.0,
        humor: 1.0,
        responsibility: 1.2,
        challenge: 1.1,
        confidence: 1.1
      };
      const totalWeight = 0.9;
      const tieBreakerOrder = [
        'Carry Goat', 'Responsible Anchor', 'Team Supporter', 'Rational Thinker',
        'Confident Competitor', 'Bald Grinder', 'Friend Collector', 'Jokester',
        'Self-Deprecating Humorist', 'Balanced Player', 'Lying Flat Fish', 'Rusher', 'Challenge Avoider', 'Emotional Player'
      ];

      let matchedType = 'Balanced Player';
      let bestDistance = Infinity;
      for (const type of tieBreakerOrder) {
        // 应用硬约束（仅对指定人格生效；不满足则直接排除该候选）
        if (type === 'Carry Goat' && !isChallengeTop1) continue;
        if (type === 'Bald Grinder' && !isChallengeTop2) continue;

        const prototype = personalityPrototypes[type];
        let distance = 0;
        Object.entries(axisWeights).forEach(([axis, weight]) => {
          const delta = scores[axis] - prototype[axis];
          distance += weight * delta * delta;
        });
        const totalDelta = totalScore - prototype.total;
        distance += totalWeight * totalDelta * totalDelta;

        if (distance < bestDistance) {
          bestDistance = distance;
          matchedType = type;
        }
      }

      // 如果找到匹配的类型
      if (matchedType) {
        result = {
          type: matchedType,
          ...ddnetTypes[matchedType],
          scores: scores,
          totalScore
        };
      } else {
        // 如果没有找到匹配的类型，使用默认类型（Balanced Player）
        result = {
          type: 'Balanced Player',
          ...ddnetTypes['Balanced Player'],
          scores: scores,
          totalScore
        };
      }
    }

    // 显示结果
      function showResult() {
        if (result) {
          // 清除该人格的报告生成状态
          localStorage.removeItem('reportGenerated_' + result.type);
          
          // 跳转到结果页面，传递类型和答题内容
          window.location.href = `result.html?type=${encodeURIComponent(result.type)}&answers=${encodeURIComponent(JSON.stringify(answers))}`;
        }
      }

    // 重置测试 - 清除所有记录，从第一题重新开始
    function resetTest() {
      // 彻底清除所有历史记录
      clearAllHistory();
      
      // 重置答题进度
      currentQuestionIndex = 0;
      result = null;
      
      // 重新记录答题开始时间
      testStartTime = Date.now();
      
      // 重新加载当前题目（第1题）
      loadQuestion();
      
      // 更新进度显示
      updateProgress();
    }

    // 初始化
    init();
  </script>
